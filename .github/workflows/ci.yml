name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build_test_lint:
    name: Build, Test, and Lint
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    
    - name: Setup Rust Toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
        
    - name: Rust Cache
      uses: Swatinem/rust-cache@v2
      
    - name: Enforce Strict Formatting
      run: cargo fmt --all -- --check
      
    - name: Quality Assurance (Clippy)
      run: cargo clippy --workspace -- -D warnings
      
    - name: Standard Compilation
      run: cargo build --workspace
      
    - name: Executive Test Suite 
      run: cargo test --workspace
      
  wasm_compilation:
    name: WASM Target Compilation
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    
    - name: Setup Rust WebAssembly Toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: wasm32-unknown-unknown
        
    - name: Initialize Wasm-Pack
      run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      
    - name: Compile to Web Target
      working-directory: crates/lumina-wasm
      run: wasm-pack build --target web --out-dir pkg --release
